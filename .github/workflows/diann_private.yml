name: DIA-NN private CI (latest versions)

# Tests DIA-NN versions > 1.8.1 that require private container registry access
on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
  workflow_dispatch:

env:
  NXF_ANSI_LOG: false

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    name: Run test_latest_dia with Docker
    runs-on: ubuntu-latest
    env:
      NXF_ANSI_LOG: false
      CAPSULE_LOG: none
      TEST_PROFILE: test_latest_dia
      EXEC_PROFILE: docker

    # Only runs on forks/repos with GHCR credentials configured
    if: ${{ github.repository == 'ypriverol/quantmsdiann' || github.repository == 'bigbio/quantmsdiann' }}

    steps:
      - name: Check out pipeline code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: "25.04.0"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Disk space cleanup
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Run test_latest_dia with Docker
        run: |
          nextflow run ${GITHUB_WORKSPACE} -profile $TEST_PROFILE,$EXEC_PROFILE,dev --outdir ${TEST_PROFILE}_${EXEC_PROFILE}_results

      - name: Gather failed logs
        if: failure() || cancelled()
        run: |
          mkdir failed_logs
          failed=$(grep "FAILED" ${TEST_PROFILE}_${EXEC_PROFILE}_results/pipeline_info/execution_trace.txt | cut -f 2)
          while read -r line ; do cp $(ls work/${line}*/*.log) failed_logs/ | true ; done <<< "$failed"

      - name: Set timestamp
        if: always()
        run: |
          echo "ARTIFACT_TIMESTAMP=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        if: failure() || cancelled()
        name: Upload failed logs
        with:
          name: failed_logs_test_latest_dia_${{ github.run_id }}_${{ env.ARTIFACT_TIMESTAMP }}
          include-hidden-files: true
          path: failed_logs
          overwrite: false
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        if: success()
        name: Upload results
        with:
          name: test_latest_dia_${{ github.run_id }}_${{ env.ARTIFACT_TIMESTAMP }}_results
          include-hidden-files: true
          path: test_latest_dia_docker_results
          overwrite: false
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        if: always()
        name: Upload log
        with:
          name: nextflow_test_latest_dia_${{ github.run_id }}_${{ env.ARTIFACT_TIMESTAMP }}.log
          include-hidden-files: true
          path: .nextflow.log
          overwrite: false
          if-no-files-found: warn
