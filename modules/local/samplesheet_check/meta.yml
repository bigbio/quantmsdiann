name: samplesheet_check
description: Validate and check samplesheet/experimental design files
keywords:
  - validation
  - samplesheet
  - experimental design
  - sdrf
tools:
  - samplesheet_check
input:
  - meta: input_file
    type: file
    description: Input SDRF file with .sdrf.tsv extension
    pattern: "*.sdrf.tsv"
output:
  - meta: log
    type: file
    description: Log file from validation process
    pattern: "*.log"
  - meta: checked_file
    type: file
    description: Validated input file
    pattern: "*.sdrf.tsv"
  - meta: versions
    type: file
    description: File containing software versions
    pattern: "versions.yml"
authors:
  - "@nf-core"
  - "@bigbio"
