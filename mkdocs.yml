site_name: quantmsdiann
docs_dir: mkdocs
site_description: DIA proteomics Nextflow pipeline powered by DIA-NN
site_author: BigBio Team
site_url: https://quantmsdiann.quantms.org/
repo_name: bigbio/quantmsdiann
repo_url: https://github.com/bigbio/quantmsdiann
theme:
  name: material
  custom_dir: mkdocs/overrides
  font: false
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
extra_css:
  - https://quantms.org/css/quantms-theme.css

extra:
  analytics:
    provider: google
    property: G-6PL70G5VC1

nav:
  - Home: index.md
  - Installation: installation.md
  - Input Files: input.md
  - Usage: usage.md
  - Containers: containers.md
  - Parameters: parameters.md
  - Output: output.md
  - Publications: publications.md

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - tables
  - toc:
      permalink: true
      toc_depth: 2
