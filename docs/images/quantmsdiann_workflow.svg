<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1020" width="880" height="1020">
  <defs>
    <style>
      .station-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #333333; }
      .station-sublabel { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #777777; }
      .legend-text { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; fill: #555555; }
      .legend-title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #333333; }
      .title-text { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #999999; }
      .tool-badge { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 8.5px; font-weight: 700; fill: #ffffff; letter-spacing: 0.3px; }
      .skip-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #999999; font-style: italic; }
      .parallel-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 9px; font-weight: 600; fill: #E53935; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="880" height="1020" fill="#ffffff"/>

  <!-- ===== LEGEND (top right) ===== -->
  <g transform="translate(610, 30)">
    <text x="0" y="0" class="legend-title">LEGEND</text>
    <line x1="0" y1="18" x2="30" y2="18" stroke="#999999" stroke-width="3" stroke-dasharray="6,4"/>
    <text x="38" y="22" class="legend-text">Optional / skippable</text>
    <line x1="0" y1="40" x2="30" y2="40" stroke="#1565C0" stroke-width="5"/>
    <text x="38" y="44" class="legend-text">Input handling</text>
    <line x1="0" y1="62" x2="30" y2="62" stroke="#00897B" stroke-width="5"/>
    <text x="38" y="66" class="legend-text">Preprocessing</text>
    <line x1="0" y1="84" x2="30" y2="84" stroke="#43A047" stroke-width="5"/>
    <text x="38" y="88" class="legend-text">DIA-NN analysis</text>
    <line x1="0" y1="106" x2="30" y2="106" stroke="#F57C00" stroke-width="5"/>
    <text x="38" y="110" class="legend-text">Statistics &amp; export</text>
    <line x1="0" y1="128" x2="30" y2="128" stroke="#8E24AA" stroke-width="5"/>
    <text x="38" y="132" class="legend-text">Quality control</text>

    <!-- Separator -->
    <line x1="0" y1="148" x2="200" y2="148" stroke="#eeeeee" stroke-width="1"/>

    <!-- Station types -->
    <circle cx="8" cy="166" r="8" fill="#333333" stroke="#333333" stroke-width="2"/>
    <text x="38" y="170" class="legend-text">Process / module</text>
    <circle cx="8" cy="192" r="7" fill="#ffffff" stroke="#333333" stroke-width="2.5"/>
    <text x="38" y="196" class="legend-text">Output file</text>

    <!-- Separator -->
    <line x1="0" y1="212" x2="200" y2="212" stroke="#eeeeee" stroke-width="1"/>

    <!-- Parallel per-file -->
    <g transform="translate(0, 226)">
      <line x1="0" y1="0" x2="12" y2="0" stroke="#43A047" stroke-width="4"/>
      <line x1="18" y1="0" x2="30" y2="0" stroke="#E53935" stroke-width="4"/>
      <text x="38" y="4" class="legend-text">Per-file (parallel)</text>
    </g>
    <!-- Single collective -->
    <g transform="translate(0, 250)">
      <line x1="0" y1="0" x2="30" y2="0" stroke="#43A047" stroke-width="5"/>
      <text x="38" y="4" class="legend-text">Collective (all files)</text>
    </g>
  </g>

  <!-- ===== METRO LINES (drawn first, behind stations) ===== -->

  <!-- === INPUT LINE (Blue) — single === -->
  <path d="M 140,80 L 140,230" stroke="#1565C0" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 380,80 L 380,150 Q 380,180 350,180 L 220,180 Q 190,180 190,210 L 190,230" stroke="#1565C0" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- === PREPROCESSING LINE (Teal) === -->
  <!-- Input Check — single -->
  <path d="M 140,230 L 140,280" stroke="#00897B" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 190,230 L 190,260 Q 190,275 175,275 L 155,275 Q 140,275 140,290" stroke="#00897B" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- File Preparation — PARALLEL: fork into dual rails -->
  <!-- Fork from single to dual -->
  <path d="M 140,280 L 134,300" stroke="#43A047" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 140,280 L 146,300" stroke="#E53935" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Dual rails through File Preparation -->
  <path d="M 134,300 L 134,370" stroke="#43A047" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 146,300 L 146,370" stroke="#E53935" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Merge back to single -->
  <path d="M 134,370 L 140,390" stroke="#43A047" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 146,370 L 140,390" stroke="#E53935" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- === DIA-NN LINE (Green) — single trunk === -->
  <!-- Curve from preprocessing to DIA-NN column -->
  <path d="M 140,390 L 140,420 Q 140,440 170,440 L 280,440 Q 310,440 310,460 L 310,490" stroke="#43A047" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- === Generate Config to In-silico Library — single === -->
  <path d="M 310,490 L 310,570" stroke="#43A047" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Optional branch: skip spectral library (dashed) -->
  <path d="M 310,530 Q 310,515 340,515 L 430,515 Q 460,515 460,540 L 460,555 Q 460,580 430,580 L 340,580 Q 310,580 310,600" stroke="#999999" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="6,4"/>

  <!-- === Preliminary Analysis — PARALLEL: fork into dual rails === -->
  <!-- Fork -->
  <path d="M 310,570 L 304,590" stroke="#43A047" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 310,570 L 316,590" stroke="#E53935" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Dual rails -->
  <path d="M 304,590 L 304,640" stroke="#43A047" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 316,590 L 316,640" stroke="#E53935" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Merge -->
  <path d="M 304,640 L 310,660" stroke="#43A047" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 316,640 L 310,660" stroke="#E53935" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- === Empirical Library Assembly — single (collective .collect()) === -->
  <path d="M 310,660 L 310,700" stroke="#43A047" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Optional branch: skip preliminary + empirical -->
  <path d="M 310,570 Q 310,555 280,555 L 120,555 Q 90,555 90,585 L 90,700 Q 90,730 120,730 L 280,730 Q 310,730 310,745" stroke="#999999" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="6,4"/>

  <!-- === Individual Analysis — PARALLEL: fork into dual rails === -->
  <!-- Single from Empirical to fork -->
  <path d="M 310,700 L 310,730" stroke="#43A047" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Fork -->
  <path d="M 310,730 L 304,750" stroke="#43A047" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 310,730 L 316,750" stroke="#E53935" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Dual rails -->
  <path d="M 304,750 L 304,800" stroke="#43A047" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 316,750 L 316,800" stroke="#E53935" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Merge -->
  <path d="M 304,800 L 310,820" stroke="#43A047" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 316,800 L 310,820" stroke="#E53935" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- === Final Quantification — single (collective .collect()) === -->
  <path d="M 310,820 L 310,850" stroke="#43A047" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- === STATISTICS LINE (Orange) === -->
  <path d="M 310,850 L 310,910" stroke="#F57C00" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- === QC LINE (Purple) — branch from Final Quant === -->
  <path d="M 310,850 Q 310,870 340,870 L 480,870 Q 510,870 510,890 L 510,940" stroke="#8E24AA" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- === OUTPUT LINES === -->
  <path d="M 310,910 L 310,970" stroke="#F57C00" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 310,850 Q 310,870 280,870 L 150,870 Q 120,870 120,890 L 120,970" stroke="#43A047" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 510,940 L 510,970" stroke="#8E24AA" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- ===== STATIONS ===== -->

  <!-- == INPUT STATIONS == -->
  <circle cx="140" cy="80" r="9" fill="#1565C0" stroke="#ffffff" stroke-width="2"/>
  <text x="160" y="76" class="station-label">SDRF + Raw Files</text>
  <text x="160" y="92" class="station-sublabel">.raw / .mzML / .d / .dia</text>

  <circle cx="380" cy="80" r="9" fill="#1565C0" stroke="#ffffff" stroke-width="2"/>
  <text x="400" y="76" class="station-label">FASTA Database</text>
  <text x="400" y="92" class="station-sublabel">Protein sequences</text>

  <!-- == PREPROCESSING STATIONS == -->
  <!-- Input Check -->
  <circle cx="140" cy="230" r="9" fill="#00897B" stroke="#ffffff" stroke-width="2"/>
  <rect x="158" y="220" width="78" height="17" rx="3" fill="#00897B"/>
  <text x="197" y="232" class="tool-badge" text-anchor="middle">INPUT_CHECK</text>
  <text x="248" y="232" class="station-label">Input Validation</text>
  <text x="248" y="248" class="station-sublabel">SDRF parsing &amp; validation</text>

  <!-- Create Input Channel (smaller intermediate) -->
  <circle cx="140" cy="280" r="6" fill="#00897B" stroke="#ffffff" stroke-width="2"/>
  <text x="160" y="284" class="station-sublabel">Create Input Channel</text>

  <!-- File Preparation — PER-FILE -->
  <circle cx="140" cy="335" r="9" fill="#00897B" stroke="#ffffff" stroke-width="2"/>
  <rect x="158" y="325" width="105" height="17" rx="3" fill="#00897B"/>
  <text x="210" y="337" class="tool-badge" text-anchor="middle">FILE_PREPARATION</text>
  <text x="275" y="337" class="station-label">File Preparation</text>
  <text x="275" y="353" class="station-sublabel">RAW → mzML conversion, indexing</text>
  <text x="275" y="367" class="parallel-label">⫽ per-file parallel</text>

  <!-- == DIA-NN STATIONS == -->
  <!-- Generate Config — collective -->
  <circle cx="310" cy="490" r="9" fill="#43A047" stroke="#ffffff" stroke-width="2"/>
  <rect x="328" y="480" width="96" height="17" rx="3" fill="#43A047"/>
  <text x="376" y="492" class="tool-badge" text-anchor="middle">GENERATE_CFG</text>
  <text x="436" y="492" class="station-label">Generate Config</text>
  <text x="436" y="508" class="station-sublabel">enzyme + mods → diann.cfg</text>

  <!-- In-silico Library — collective -->
  <circle cx="310" cy="530" r="9" fill="#43A047" stroke="#ffffff" stroke-width="2"/>
  <rect x="328" y="520" width="178" height="17" rx="3" fill="#43A047"/>
  <text x="417" y="532" class="tool-badge" text-anchor="middle">INSILICO_LIBRARY_GENERATION</text>
  <text x="518" y="532" class="station-label">Spectral Library</text>
  <text x="518" y="548" class="station-sublabel">in-silico prediction from FASTA</text>
  <text x="518" y="564" class="skip-label">skip if --diann_speclib</text>

  <!-- Preliminary Analysis — PER-FILE -->
  <circle cx="310" cy="615" r="9" fill="#43A047" stroke="#ffffff" stroke-width="2"/>
  <rect x="328" y="605" width="130" height="17" rx="3" fill="#43A047"/>
  <text x="393" y="617" class="tool-badge" text-anchor="middle">PRELIMINARY_ANALYSIS</text>
  <text x="470" y="617" class="station-label">Preliminary Analysis</text>
  <text x="470" y="633" class="station-sublabel">per-file calibration &amp; mass accuracy</text>
  <text x="470" y="647" class="parallel-label">⫽ per-file parallel</text>

  <!-- Assemble Empirical Library — collective -->
  <circle cx="310" cy="700" r="9" fill="#43A047" stroke="#ffffff" stroke-width="2"/>
  <rect x="328" y="690" width="155" height="17" rx="3" fill="#43A047"/>
  <text x="405" y="702" class="tool-badge" text-anchor="middle">ASSEMBLE_EMPIRICAL_LIBRARY</text>
  <text x="495" y="702" class="station-label">Empirical Library</text>
  <text x="495" y="718" class="station-sublabel">consensus from .quant files</text>

  <!-- Skip annotation for preliminary + empirical -->
  <text x="75" y="635" class="skip-label" text-anchor="end">skip if</text>
  <text x="75" y="647" class="skip-label" text-anchor="end">--skip_preliminary</text>
  <text x="75" y="659" class="skip-label" text-anchor="end">_analysis</text>

  <!-- Individual Analysis — PER-FILE -->
  <circle cx="310" cy="775" r="9" fill="#43A047" stroke="#ffffff" stroke-width="2"/>
  <rect x="328" y="765" width="126" height="17" rx="3" fill="#43A047"/>
  <text x="391" y="777" class="tool-badge" text-anchor="middle">INDIVIDUAL_ANALYSIS</text>
  <text x="466" y="777" class="station-label">Individual Analysis</text>
  <text x="466" y="793" class="station-sublabel">per-file search with empirical library</text>
  <text x="466" y="807" class="parallel-label">⫽ per-file parallel</text>

  <!-- Final Quantification — collective -->
  <circle cx="310" cy="850" r="9" fill="#43A047" stroke="#ffffff" stroke-width="2"/>
  <rect x="328" y="840" width="132" height="17" rx="3" fill="#43A047"/>
  <text x="394" y="852" class="tool-badge" text-anchor="middle">FINAL_QUANTIFICATION</text>
  <text x="472" y="852" class="station-label">Final Quantification</text>
  <text x="472" y="868" class="station-sublabel">summary report + matrices</text>

  <!-- == STATISTICS STATION — collective == -->
  <circle cx="310" cy="910" r="9" fill="#F57C00" stroke="#ffffff" stroke-width="2"/>
  <rect x="328" y="900" width="96" height="17" rx="3" fill="#F57C00"/>
  <text x="376" y="912" class="tool-badge" text-anchor="middle">DIANN_MSSTATS</text>
  <text x="325" y="930" class="station-label">MSstats Conversion</text>
  <text x="325" y="944" class="station-sublabel">DIA-NN report → MSstats CSV</text>

  <!-- == QC STATION — collective == -->
  <circle cx="510" cy="940" r="9" fill="#8E24AA" stroke="#ffffff" stroke-width="2"/>
  <rect x="528" y="930" width="66" height="17" rx="3" fill="#8E24AA"/>
  <text x="561" y="942" class="tool-badge" text-anchor="middle">PMULTIQC</text>
  <text x="606" y="942" class="station-label">pMultiQC</text>
  <text x="606" y="958" class="station-sublabel">Quality control report</text>

  <!-- == OUTPUT STATIONS (open circles) == -->
  <circle cx="120" cy="980" r="8" fill="#ffffff" stroke="#43A047" stroke-width="2.5"/>
  <text x="120" y="1000" class="station-label" text-anchor="middle">Quant Tables</text>
  <text x="120" y="1014" class="station-sublabel" text-anchor="middle">pg / pr / gg matrices</text>

  <circle cx="310" cy="980" r="8" fill="#ffffff" stroke="#F57C00" stroke-width="2.5"/>
  <text x="310" y="1000" class="station-label" text-anchor="middle">MSstats CSV</text>
  <text x="310" y="1014" class="station-sublabel" text-anchor="middle">msstats_in.csv</text>

  <circle cx="510" cy="980" r="8" fill="#ffffff" stroke="#8E24AA" stroke-width="2.5"/>
  <text x="510" y="1000" class="station-label" text-anchor="middle">QC Report</text>
  <text x="510" y="1014" class="station-sublabel" text-anchor="middle">HTML interactive</text>

</svg>
